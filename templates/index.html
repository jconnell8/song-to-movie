<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Movie Match</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Alfa+Slab+One&display=swap" rel="stylesheet" />

  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:        #0d0d18;
      --surface:   #13131f;
      --surface-2: #1a1a2a;
      --border:    #1f1f30;
      --text:      #e2e2f0;  /* 15:1 on --surface ✓ */
      --muted:     #9090b0;  /* 5.8:1 on --surface ✓  5.3:1 on --surface-2 ✓ */
      --purple:    #b472f9;  /* 5.5:1 on --surface ✓  5.1:1 on --surface-2 ✓ */
      --orange:    #f97316;  /* 6.2:1 on --surface ✓ */
      --orange-dk: #e06210;
      --yellow:    #facc15;  /* 11:1  on --surface ✓ */
      --red-dim:   #7f1d1d;
    }

    body {
      font-family: 'Segoe UI', system-ui, sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 2.5rem 1rem 4rem;
    }

    /* ── Header ── */
    header {
      text-align: center;
      margin-bottom: 2rem;
    }
    header h1 {
      font-family: 'Alfa Slab One', serif;
      font-size: 2rem;
      background: linear-gradient(135deg, #f97316 0%, #db2777 55%, #b472f9 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      line-height: 1.1;
    }
    header p {
      color: var(--muted);
      margin-top: 0.6rem;
      font-size: 0.95rem;
    }

    /* ── Search form ── */
    .form-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 16px;
      padding: 1.75rem 2rem;
      width: 100%;
      max-width: 500px;
    }
    .form-group { margin-bottom: 1.1rem; }
    label {
      display: block;
      font-size: 0.72rem;
      color: var(--muted);
      margin-bottom: 0.4rem;
      letter-spacing: 0.07em;
      text-transform: uppercase;
    }
    input {
      width: 100%;
      padding: 0.72rem 1rem;
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: 8px;
      color: var(--text);
      font-size: 0.97rem;
      transition: border-color 0.15s;
    }
    input:focus { outline: none; border-color: var(--purple); }
    input::placeholder { color: #3a3a55; } /* placeholders exempt from contrast rules */

    button#submit-btn {
      width: 100%;
      padding: 0.82rem;
      background: var(--orange);
      border: none;
      border-radius: 8px;
      color: #fff;
      font-size: 0.97rem;
      font-weight: 700;
      letter-spacing: 0.01em;
      cursor: pointer;
      transition: background 0.15s, transform 0.1s;
      margin-top: 0.25rem;
    }
    button#submit-btn:hover  { background: var(--orange-dk); }
    button#submit-btn:active { transform: scale(0.98); }
    button#submit-btn:disabled { opacity: 0.45; cursor: not-allowed; transform: none; }

    /* ── Results: two columns, equal height ── */
    #result {
      display: none;
      margin-top: 2rem;
      width: 100%;
      max-width: 860px;
    }
    .results-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 1rem;
      /* default align-items: stretch → equal heights */
    }
    @media (max-width: 620px) {
      .results-grid { grid-template-columns: 1fr; }
    }

    /* ── Shared eyebrow ── */
    .eyebrow {
      font-size: 0.72rem;
      color: var(--orange);
      text-transform: uppercase;
      letter-spacing: 0.09em;
    }

    /* ── Left column: full-bleed album art ── */
    .col-track {
      background: var(--surface);  /* fallback when no album art */
      border: 1px solid var(--border);
      border-radius: 16px;
      position: relative;
      overflow: hidden;
    }
    /* Album art fills the entire card */
    .col-track .album-bg {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: block;
    }
    /* Gradient overlay — transparent top, opaque dark bottom */
    .col-track .track-overlay {
      position: relative;
      z-index: 1;
      display: flex;
      flex-direction: column;
      justify-content: flex-end;
      gap: 0.65rem;
      padding: 1.25rem;
      min-height: 280px;
      height: 100%;
      background: linear-gradient(
        to bottom,
        rgba(13, 13, 24, 0.0) 0%,
        rgba(13, 13, 24, 0.55) 38%,
        rgba(13, 13, 24, 0.96) 68%,
        rgba(13, 13, 24, 1.0) 100%
      );
    }
    .col-track .track-name {
      font-size: 1.1rem;
      font-weight: 700;
      line-height: 1.3;
      color: var(--text);
    }
    .col-track .track-sub {
      font-size: 0.82rem;
      color: var(--muted);
    }

    /* Low-confidence warning */
    .low-confidence-banner {
      background: #1c1508;
      border: 1px solid #7c4a0a;
      border-radius: 8px;
      padding: 0.6rem 0.85rem;
      font-size: 0.8rem;
      color: #fbbf24;  /* 11.5:1 on #1c1508 ✓ */
      display: flex;
      gap: 0.5rem;
      align-items: flex-start;
      line-height: 1.45;
    }
    .low-confidence-banner .icon { flex-shrink: 0; }

    .tag-row { display: flex; flex-wrap: wrap; gap: 0.45rem; }
    .lastfm-tag {
      background: rgba(26, 26, 42, 0.85);
      border: 1px solid var(--border);
      border-radius: 999px;
      padding: 0.28rem 0.75rem;
      font-size: 0.77rem;
      color: var(--purple);  /* 5.1:1 on --surface-2 ✓ */
    }
    .listeners-note {
      font-size: 0.76rem;
      color: var(--muted);  /* 5.8:1 on --surface ✓  (was #40405a = 1.9:1 ✗) */
    }

    /* ── Right column: movie ── */
    .col-movie {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 16px;
      padding: 1.25rem;
      display: flex;
      flex-direction: column;
      gap: 0.9rem;
    }
    .movie-header {
      display: flex;
      gap: 0.9rem;
      align-items: flex-start;
    }
    .movie-poster,
    .movie-poster-placeholder {
      flex-shrink: 0;
      width: 72px;
      border-radius: 6px;
      overflow: hidden;
    }
    .movie-poster img { width: 100%; display: block; }
    .movie-poster-placeholder { height: 108px; background: var(--surface-2); }
    .movie-meta h2 {
      font-size: 1.05rem;
      font-weight: 700;
      line-height: 1.3;
      color: var(--text);
    }
    .movie-meta .sub {
      color: var(--muted);  /* 5.8:1 on --surface ✓ */
      font-size: 0.8rem;
      margin-top: 0.3rem;
      display: flex;
      gap: 0.6rem;
      flex-wrap: wrap;
      align-items: center;
    }
    .movie-meta .rating { color: var(--yellow); font-weight: 600; }
    .reason {
      color: #b8b8d4;  /* 8.8:1 on --surface ✓ */
      font-size: 0.87rem;
      line-height: 1.65;
    }
    .mood-tags { display: flex; flex-wrap: wrap; gap: 0.4rem; }
    .mood-tag {
      background: var(--surface-2);
      border-radius: 999px;
      padding: 0.25rem 0.7rem;
      font-size: 0.75rem;
      color: var(--muted);  /* 5.3:1 on --surface-2 ✓ */
    }
    .tmdb-link {
      display: inline-block;
      font-size: 0.77rem;
      color: var(--orange);
      text-decoration: none;
      margin-top: auto;
    }
    .tmdb-link:hover { text-decoration: underline; }

    /* ── Error / spinner ── */
    .error-box {
      background: #200d0d;
      border: 1px solid var(--red-dim);
      border-radius: 10px;
      padding: 1rem;
      color: #f87171;
      font-size: 0.88rem;
    }
    .spinner {
      display: inline-block;
      width: 16px;
      height: 16px;
      border: 2px solid rgba(255,255,255,0.25);
      border-top-color: #fff;
      border-radius: 50%;
      animation: spin 0.65s linear infinite;
      vertical-align: middle;
      margin-right: 0.45rem;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
  </style>
</head>
<body>

<header>
  <h1>Movie Match</h1>
  <p>Enter your favorite song and find which movie aligns best with that vibe.</p>
</header>

<div class="form-card">
  <div class="form-group">
    <label for="title">Song Title</label>
    <input id="title" type="text" placeholder="e.g. Midnight Rain" />
  </div>
  <div class="form-group" style="margin-bottom:1.4rem">
    <label for="artist">Artist</label>
    <input id="artist" type="text" placeholder="e.g. Taylor Swift" />
  </div>
  <button id="submit-btn" onclick="findMatch()">Find My Movie Match</button>
</div>

<div id="result"></div>

<script>
  async function findMatch() {
    const title  = document.getElementById('title').value.trim();
    const artist = document.getElementById('artist').value.trim();
    const btn    = document.getElementById('submit-btn');
    const resultDiv = document.getElementById('result');

    if (!title || !artist) {
      resultDiv.style.display = 'block';
      resultDiv.innerHTML = '<div class="error-box">Please enter both a song title and an artist.</div>';
      return;
    }

    btn.disabled = true;
    btn.innerHTML = '<span class="spinner"></span>Analyzing vibe…';
    resultDiv.style.display = 'none';
    resultDiv.innerHTML = '';

    try {
      const res  = await fetch('/match', {
        method:  'POST',
        headers: { 'Content-Type': 'application/json' },
        body:    JSON.stringify({ title, artist }),
      });
      const data = await res.json();

      if (!res.ok) {
        resultDiv.style.display = 'block';
        resultDiv.innerHTML = `<div class="error-box">${data.error || 'Something went wrong.'}</div>`;
        return;
      }

      const { track, match } = data;

      // ── Left column: full-bleed album art ──
      const albumBgHtml = track.image
        ? `<img class="album-bg" src="${track.image}" alt="" aria-hidden="true" />`
        : '';

      const lowConfHtml = track.low_confidence
        ? `<div class="low-confidence-banner">
             <span class="icon">⚠</span>
             <span>Limited Last.fm data for this track — result may be less precise than usual.</span>
           </div>`
        : '';

      const tagsHtml = (track.tags || []).length
        ? `<div class="tag-row">${track.tags.map(t => `<span class="lastfm-tag">${t}</span>`).join('')}</div>`
        : '';

      const listenersHtml = track.listeners
        ? `<div class="listeners-note">${Number(track.listeners).toLocaleString()} Last.fm listeners</div>`
        : '';

      // ── Right column: movie ──
      const tmdb = match.tmdb;

      const posterHtml = tmdb?.poster
        ? `<div class="movie-poster"><img src="${tmdb.poster}" alt="Movie poster for ${tmdb.title}" /></div>`
        : `<div class="movie-poster-placeholder" role="img" aria-label="No poster available"></div>`;

      const movieTitle   = tmdb ? `${tmdb.title} (${tmdb.year})` : match.movie;
      const ratingHtml   = tmdb?.rating ? `<span class="rating">★ ${tmdb.rating}</span>` : '';
      const tmdbLinkHtml = tmdb?.tmdb_url
        ? `<a class="tmdb-link" href="${tmdb.tmdb_url}" target="_blank" rel="noopener">View on TMDB →</a>`
        : '';

      const moodTagsHtml = (match.mood_tags || [])
        .map(t => `<span class="mood-tag">${t}</span>`)
        .join('');

      resultDiv.style.display = 'block';
      resultDiv.innerHTML = `
        <div class="results-grid">

          <div class="col-track">
            ${albumBgHtml}
            <div class="track-overlay">
              <div class="eyebrow">Your Song</div>
              <div class="track-name">${track.name}</div>
              <div class="track-sub">${track.artist}${track.album ? ' · ' + track.album : ''}</div>
              ${lowConfHtml}
              ${tagsHtml}
              ${listenersHtml}
            </div>
          </div>

          <div class="col-movie">
            <div class="eyebrow">Movie Match</div>
            <div class="movie-header">
              ${posterHtml}
              <div class="movie-meta">
                <h2>${movieTitle}</h2>
                <div class="sub">
                  <span>dir. ${match.director}</span>
                  ${ratingHtml}
                </div>
              </div>
            </div>
            <p class="reason">${match.reason}</p>
            <div class="mood-tags">${moodTagsHtml}</div>
            ${tmdbLinkHtml}
          </div>

        </div>
      `;
    } catch (err) {
      resultDiv.style.display = 'block';
      resultDiv.innerHTML = `<div class="error-box">Network error: ${err.message}</div>`;
    } finally {
      btn.disabled = false;
      btn.innerHTML = 'Find My Movie Match';
    }
  }

  document.addEventListener('keydown', e => {
    if (e.key === 'Enter') findMatch();
  });
</script>

</body>
</html>
